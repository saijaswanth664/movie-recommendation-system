<!DOCTYPE html>
<html>

<head>

<title>Movie Recommendation System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container text-center mt-5">

<h1 class="mb-4">🎬 Movie Recommendation System</h1>

<form method="POST">

<input class="form-control mb-3" type="text" name="movie" placeholder="Enter movie name (Example: Toy Story (1995))" required>

<button class="btn btn-warning">Recommend</button>

</form>

</div>


<div class="container mt-5">

<div class="row">

{% for movie in recommendations %}

<div class="col-md-3 mb-3">

<div class="card bg-secondary text-white">

<div class="card-body text-center">

<h5>{{movie}}</h5>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
